        <h4>Kawasaki Ninja H2R</h4>
       <ul>
            <li>Engine Type:Liquid-cooled, 4-stroke, In-Line Four with Supercharger</li>

            <li>Max Power:\(\sim306 \text{ - } 326 \text{ hp} \ @ \ 14,000 \text{ rpm}\)</li>

            <li>Top Speed:~400 km/h (240 mph)</li>
            <li>Price:There is no official retail price for a real Kawasaki Ninja H2R in Sri Lanka because it is a track-only hyperbike that cannot be legally registered for public roads, and high-capacity superbikes are subject to strict import restrictions. However, based on its global retail value of roughly $58,000 USD (and over ₹79–85 lakh in regional markets like India), importing one to Sri Lanka privately would cost an estimated LKR 25,000,000 to LKR 35,000,000 or more after accounting for custom duties, luxury taxes, and shipping fees.</li>
       </ul>
    </figcaption>
</figure>

        <!-- Motorcycle 2 -->
        <figure>
    <img src="assets\Ducati Panigale V4R (R).avif" width="400" height="200">
    <figcaption>
        <h4>Ducati Panigale V4R</h4>
       <ul>
            <li>Displacement:998 cc Desmosedici Stradale R.</li>
            <li>Power Output:218 hp (Euro 5+) in stock road-legal trim, reaching up to 240.5 hp in full track configuration (with racing exhaust and Shell performance oil).</li>
            <li>Torque: 82.6 lb-ft (112 Nm) @ 12,000 rpm.</li>
            <li>Top Speed:Exceeds 205 mph (330 km/h) in race configuration.</li>
            <li>Gearbox:The first homologated sports bike to feature a race-style Ducati Racing Gearbox (DRG) with the neutral lock at the very bottom (1-down, 5-up pattern).</li>
            <li>Price:A brand new Ducati Panigale V4 R is not readily available through official local dealerships in Sri Lanka. Importing this flagship superbike—which has a US base MSRP of $49,995—can cost well over LKR 25 million to 30+ million, depending on custom duties, freight, and luxury vehicle taxes.</li>
       </ul>
    </figcaption>
</figure>

        <!-- Motorcycle 3 -->
        <figure>
    <img src="assets\BMW S1000RR.webp" width="400" height="200">
    <figcaption>
        <h4>BMW S1000RR</h4>
       <ul>
            <li>Engine Type:Water/oil-cooled 4-cylinder, 4-stroke in-line engine</li>
            <li>Max Horsepower:210 HP (154 kW) @ 13,750 rpm</li>
            <li>Torque: 82.6 lb-ft (112 Nm) @ 12,000 rpm.</li>
            <li>Max Torque:113 Nm (83 lb-ft) @ 11,000 rpm</li>
            <li>Valve Technology:BMW ShiftCam for variable intake camshaft timing and stroke, optimizing power delivery across the entire rev range.</li>
            <li>Price:In Sri Lanka, the market price for a used or unregistered BMW S1000RR typically ranges from LKR 2,150,000 to LKR 6,500,000, heavily depending on the manufacturing year, package options, and overall condition. Brand new models are generally unavailable due to vehicle import restrictions, meaning pricing relies entirely on the secondary marketplace.</li>
       </ul>
    </figcaption>
</figure>
